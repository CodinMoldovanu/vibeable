services:
  postgres:
    image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibeable
      POSTGRES_USER: vibeable
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibeable -d vibeable"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [control]

  vibeable:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8787
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8787}
      DATABASE_URL: postgres://vibeable:${POSTGRES_PASSWORD}@postgres:5432/vibeable
      DATABASE_SSL: disable
      MASTER_KEY: ${MASTER_KEY:?set MASTER_KEY}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      LOCAL_LOGIN_ENABLED: ${LOCAL_LOGIN_ENABLED:-true}
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_CLIENT_AUTH_METHOD: ${OIDC_CLIENT_AUTH_METHOD:-client_secret_basic}
      OIDC_DISPLAY_NAME: ${OIDC_DISPLAY_NAME:-Company SSO}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email groups}
      OIDC_ORGANIZATION_SLUG: ${OIDC_ORGANIZATION_SLUG:-}
      OIDC_AUTO_PROVISION: ${OIDC_AUTO_PROVISION:-false}
      OIDC_ALLOW_EMAIL_LINKING: ${OIDC_ALLOW_EMAIL_LINKING:-false}
      OIDC_DEFAULT_ROLE: ${OIDC_DEFAULT_ROLE:-viewer}
      OIDC_SIGNING_ALGORITHMS: ${OIDC_SIGNING_ALGORITHMS:-RS256,ES256}
      OIDC_GROUPS_CLAIM: ${OIDC_GROUPS_CLAIM:-groups}
      OIDC_ROLE_MAPPING: ${OIDC_ROLE_MAPPING:-}
      OIDC_TEAM_MAPPING: ${OIDC_TEAM_MAPPING:-}
      OIDC_SYNC_TEAM_MEMBERSHIPS: ${OIDC_SYNC_TEAM_MEMBERSHIPS:-true}
      OIDC_ALLOWED_EMAIL_DOMAINS: ${OIDC_ALLOWED_EMAIL_DOMAINS:-}
      OIDC_REQUIRE_VERIFIED_EMAIL: ${OIDC_REQUIRE_VERIFIED_EMAIL:-true}
      OIDC_ALLOW_PRIVATE_ENDPOINTS: ${OIDC_ALLOW_PRIVATE_ENDPOINTS:-false}
      OIDC_ALLOW_INSECURE_HTTP: ${OIDC_ALLOW_INSECURE_HTTP:-false}
      REQUIRE_SEPARATE_APPROVER: ${REQUIRE_SEPARATE_APPROVER:-true}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      EXECUTION_MODE: ${EXECUTION_MODE:-disabled}
      DEPLOYMENT_EXECUTION_MODE: ${DEPLOYMENT_EXECUTION_MODE:-disabled}
      ALLOW_PRIVATE_AI_ENDPOINTS: ${ALLOW_PRIVATE_AI_ENDPOINTS:-false}
    ports:
      - "${VIBEABLE_PORT:-8787}:8787"
    volumes:
      - workspace-data:/data
    networks: [control]
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]

networks:
  control:

volumes:
  postgres-data:
  workspace-data:
