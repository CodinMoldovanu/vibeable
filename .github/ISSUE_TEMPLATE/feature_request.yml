name: Feature request
description: Propose a concrete product or platform improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the workflow or limitation, not only the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and tenancy impact
      description: Note changes to permissions, secrets, networking, sandboxes, or tenant boundaries.
